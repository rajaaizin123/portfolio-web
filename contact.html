<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me - Raja Aizin's Portfolio</title>
    <link rel="stylesheet" href="assets/css/app.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
</head>
<body class="font-inter bg-gray-100">
    <div class="fixed top-6 left-0 right-0 flex justify-center z-50">
        <div class="w-full max-w-4xl bg-white/70 backdrop-blur-md shadow-md h-14 rounded-full flex items-center justify-center space-x-6 px-8">
            <a href="index.html" class="text-gray-700 hover:text-gray-900 font-medium text-base px-4 py-2 rounded-full hover:bg-gray-100 transition-colors duration-300">Home</a>
            <a href="articles.html" class="text-gray-700 hover:text-gray-900 font-medium text-base px-4 py-2 rounded-full hover:bg-gray-100 transition-colors duration-300">Article</a>
            <a href="contact.html" class="text-gray-900 font-bold text-base px-4 py-2 rounded-full bg-gray-200">Contact Me</a>
        </div>
    </div>

    <main class="min-h-screen flex flex-col items-center py-24 px-4">
        <section class="w-full max-w-2xl bg-white p-8 rounded-lg shadow">
            <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">Contact Me</h1>
            <p class="text-lg text-gray-700 mb-8 text-center">Have any questions or want to work together? Feel free to reach out!</p>

            <form class="space-y-6" action="https://formspree.io/f/mqevqwvd" method="POST" data-contact-form>
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-2">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-2">Message</label>
                    <textarea name="message" rows="5" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <input type="hidden" name="_subject" value="New portfolio contact message" />

                <div class="flex justify-end">
                    <button type="submit" class="bg-gray-900 text-white px-6 py-2 rounded-full hover:bg-gray-700 transition-colors duration-300 disabled:opacity-75" data-contact-submit>
                        Send Message
                    </button>
                </div>

                <p class="text-center text-base font-medium" data-contact-status aria-live="polite" hidden></p>
            </form>
        </section>
    </main>

    <footer class="w-full bg-gray-300 py-10 mt-12">
        <div class="max-w-4xl mx-auto text-center">
            <p class="text-base font-medium text-gray-900">2025 by Raja Aizin</p>
        </div>
    </footer>
    <script src="assets/js/app.js"></script>
</body>
</html>
